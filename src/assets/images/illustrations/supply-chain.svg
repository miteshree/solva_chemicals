<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Supply chain illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1FA3A3" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2E6FA7" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1FA3A3" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2E6FA7" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="26" fill="#FFFFFF"/>
  <rect x="24" y="24" width="1152" height="472" rx="22" fill="url(#bg)"/>

  <!-- network routes -->
  <g fill="none" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M150 360c160-160 310-220 450-190 130 28 230 120 330 240" />
    <path d="M210 150c130 60 230 120 300 180 120 105 230 150 410 160" opacity="0.6"/>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="160" cy="360" r="18" fill="#FFFFFF" stroke="#0B3C5D" stroke-width="6"/>
    <circle cx="330" cy="220" r="14" fill="#FFFFFF" stroke="#1FA3A3" stroke-width="6"/>
    <circle cx="520" cy="185" r="16" fill="#FFFFFF" stroke="#2E6FA7" stroke-width="6"/>
    <circle cx="720" cy="250" r="14" fill="#FFFFFF" stroke="#1FA3A3" stroke-width="6"/>
    <circle cx="920" cy="420" r="18" fill="#FFFFFF" stroke="#0B3C5D" stroke-width="6"/>
    <circle cx="1010" cy="300" r="12" fill="#FFFFFF" stroke="#2E6FA7" stroke-width="6"/>
  </g>

  <!-- soft glow -->
  <circle cx="920" cy="420" r="120" fill="#2E6FA7" opacity="0.08" filter="url(#soft)"/>
  <circle cx="160" cy="360" r="140" fill="#1FA3A3" opacity="0.08" filter="url(#soft)"/>

  <!-- simple icons -->
  <g transform="translate(820 78)" opacity="0.95">
    <rect x="0" y="0" width="300" height="120" rx="22" fill="#FFFFFF" opacity="0.85"/>
    <g transform="translate(26 30)" fill="none" stroke="#0B3C5D" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 46h84" />
      <path d="M18 46V20l30-14 30 14v26" />
      <path d="M34 20v26" />
      <path d="M82 20v26" />
      <circle cx="116" cy="24" r="10" />
      <path d="M116 34v28" />
      <path d="M116 62 104 50" />
      <path d="M116 62 128 50" />
    </g>
  </g>
</svg>

