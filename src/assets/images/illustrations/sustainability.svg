<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Sustainability illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1FA3A3" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2E6FA7" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1FA3A3"/>
      <stop offset="1" stop-color="#2E6FA7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="26" fill="#FFFFFF"/>
  <rect x="24" y="24" width="1152" height="472" rx="22" fill="url(#bg)"/>

  <circle cx="940" cy="130" r="150" fill="#1FA3A3" opacity="0.08" filter="url(#soft)"/>
  <circle cx="260" cy="390" r="180" fill="#2E6FA7" opacity="0.08" filter="url(#soft)"/>

  <!-- leaf + recycle loop -->
  <g transform="translate(380 90)">
    <path d="M220 40c-120 14-210 105-224 224 130 12 220-54 270-128 34-49 44-86 54-96 30-31 69-29 90 0 18 25 18 63 0 86-21 26-60 31-86 12" fill="none" stroke="url(#leaf)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M300 170c34 70 20 150-40 206-62 58-146 62-216 26" fill="none" stroke="#0B3C5D" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round"/>
    <path d="M66 405l-46 2 20-42" fill="none" stroke="#0B3C5D" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M320 168l-44-10 34-30" fill="none" stroke="#0B3C5D" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

