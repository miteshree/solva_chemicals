<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-label="Solva Chemicals header">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1FA3A3"/>
      <stop offset="1" stop-color="#2E6FA7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0B3C5D" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0B3C5D" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1400" height="520" fill="#FFFFFF"/>
  <rect x="0" y="360" width="1400" height="160" fill="url(#g2)"/>

  <!-- Brand block -->
  <g transform="translate(90 145)">
    <!-- abstract hex mark -->
    <g transform="translate(0 0)">
      <path d="M120 6 188 46v78l-68 40-68-40V46z" fill="url(#g)" opacity="0.95"/>
      <path d="M120 38 158 60v50l-38 22-38-22V60z" fill="#FFFFFF" opacity="0.94"/>
      <path d="M0 64 68 24l68 40-68 40Z" fill="#B8C2CC" opacity="0.95"/>
      <path d="M0 110 68 70l68 40-68 40Z" fill="#0B3C5D" opacity="0.88"/>
    </g>

    <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" fill="#0B3C5D">
      <text x="250" y="70" font-size="110" font-weight="800" letter-spacing="10">SOLVA</text>
      <text x="255" y="128" font-size="26" fill="#333333" letter-spacing="6">CHEMICALS CORPORATION</text>
    </g>

    <!-- divider + tagline -->
    <g transform="translate(800 18)">
      <rect x="0" y="20" width="2" height="110" rx="1" fill="#B8C2CC"/>
      <text x="34" y="72" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" letter-spacing="7" fill="#333333">MOLECULES TO MARKET</text>
    </g>
  </g>

  <!-- molecule graphic (right) -->
  <g transform="translate(1040 140)">
    <circle cx="130" cy="54" r="70" fill="url(#g)" opacity="0.35" filter="url(#blur)"/>
    <g stroke="url(#g)" stroke-width="6" fill="none" opacity="0.85" stroke-linecap="round">
      <path d="M30 200 110 150 210 190 260 120 170 70 90 90Z"/>
      <path d="M110 150 120 70"/>
      <path d="M210 190 300 210"/>
    </g>
    <g>
      <circle cx="90" cy="90" r="18" fill="#FFFFFF" stroke="#2E6FA7" stroke-width="6"/>
      <circle cx="120" cy="70" r="14" fill="#FFFFFF" stroke="#1FA3A3" stroke-width="6"/>
      <circle cx="110" cy="150" r="20" fill="#FFFFFF" stroke="#0B3C5D" stroke-width="6"/>
      <circle cx="30" cy="200" r="16" fill="#FFFFFF" stroke="#2E6FA7" stroke-width="6"/>
      <circle cx="210" cy="190" r="22" fill="#FFFFFF" stroke="#1FA3A3" stroke-width="6"/>
      <circle cx="260" cy="120" r="18" fill="#FFFFFF" stroke="#2E6FA7" stroke-width="6"/>
      <circle cx="170" cy="70" r="16" fill="#FFFFFF" stroke="#0B3C5D" stroke-width="6"/>
      <circle cx="300" cy="210" r="12" fill="#FFFFFF" stroke="#B8C2CC" stroke-width="6"/>
    </g>
  </g>
</svg>

